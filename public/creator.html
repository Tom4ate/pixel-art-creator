<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator - Assets Creator</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Assets Creator</h1>
      <div class="controls">
        <label>Width: <input type="number" id="canvas-width" value="32" min="1" max="500"></label>
        <label>Height: <input type="number" id="canvas-height" value="32" min="1" max="500"></label>
        <label>Pixel: <input type="number" id="pixel-size" value="10" min="4" max="100"></label>
        <button id="apply-size">Apply</button>
        <label>Modelo:
          <input type="text" id="model-input" value="openai/gpt-oss-120b" placeholder="nome-do-modelo">
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="limit-groq" checked> Limitar Groq
        </label>
      </div>
      <a href="/" class="dashboard-link">Dashboard</a>
    </header>
    <main>
      <div class="canvas-area">
        <div id="canvas-wrapper">
          <canvas id="pixel-canvas"></canvas>
        </div>
        <div class="canvas-tools">
          <div class="palette-container">
            <span class="palette-label">Paleta:</span>
            <div id="palette-swatches"></div>
          </div>
          <input type="color" id="color-picker" value="#ff0000">
          <button id="undo-btn">Undo</button>
          <button id="clear-btn">Clear</button>
        </div>
        <div class="history-bar">
          <div class="history-bar-header">
            <span>Versões</span>
            <button id="history-bar-toggle" class="log-toggle-btn">▼</button>
          </div>
          <div id="history-bar-content" class="history-bar-content"></div>
        </div>
      </div>
      <div class="chat-area">
        <div id="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Ex: desenhe um pixel vermelho no centro...">
          <button id="chat-send">Send</button>
          <button id="stop-btn" style="display:none">Parar</button>
        </div>
        <div class="log-panel">
          <div class="log-header">
            <span>Log do servidor</span>
            <button id="log-toggle" class="log-toggle-btn">▼</button>
          </div>
          <div id="log-content"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="confirm-overlay" class="confirm-overlay" style="display:none">
    <div class="confirm-dialog">
      <div class="confirm-title">Confirmação necessária</div>
      <div id="confirm-message" class="confirm-message"></div>
      <div class="confirm-buttons">
        <button id="confirm-yes" class="confirm-btn confirm-btn-yes">Permitir</button>
        <button id="confirm-no" class="confirm-btn confirm-btn-no">Negar</button>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/creator.js"></script>
</body>
</html>
